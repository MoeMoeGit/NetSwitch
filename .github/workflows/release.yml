name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Generate icon
        run: uv run python scripts/generate_icon.py

      - name: Build exe
        run: uv run python scripts/build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc scripts/installer_output.iss

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NetSwitch v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/NetSwitch.exe
            installer_output/NetSwitch-Setup-${{ steps.version.outputs.VERSION }}.exe
